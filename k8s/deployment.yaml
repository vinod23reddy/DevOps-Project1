apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-zone-app
  labels:
    app: food-zone-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-zone-app
  template:
    metadata:
      labels:
        app: food-zone-app
    spec:
      containers:
      - name: food-zone-app
        image: vinod23reddy/food-zone-app:latest
        ports:
        - containerPort: 80